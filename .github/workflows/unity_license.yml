name: Build App windows

on:
  workflow_dispatch: { }

# Node.js警告を消す設定（一番外側に配置）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"

jobs:
  buildForWindowsBasedPlatforms:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: [ self-hosted, Windows ]
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
        buildMethod:
          - BuildApp.Build
        unityPath:
          - '"C:\Program Files\Unity\Hub\Editor\6000.3.1f1\Editor\Unity.exe"'
          projectPath:
          - "."
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          clean: false
          submodules: recursive

      - name: Run Build
        run: |
          # projectPath を指定の変数に置き換え
          & ${{ matrix.unityPath }} -batchmode -quit -projectPath ${{ matrix.projectPath }} -buildTarget ${{ matrix.targetPlatform }} -executeMethod ${{ matrix.buildMethod }} -logFile -
      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: App_Develop
          # 末尾に /* を追加して、中身を確実に見つけるようにしました
          path: Builds/App/*
          retention-days: 7
