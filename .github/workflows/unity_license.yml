name: Build App windows

on:
  workflow_dispatch: { }

defaults:
  run:
    shell: bash

jobs:
  buildForWindowsBasedPlatforms:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: [ self-hosted, Windows ]
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
        buildMethod:
          - BuildApp.Build
        unityPath:
          - '"C:\Program Files\Unity\Hub\Editor\6000.3.1f1\Editor\Unity.exe"'
   steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 
        with:
          lfs: true
          clean: false
          submodules: recursive

      - name: Run Build
        run: |
          ${{ matrix.unityPath }} -batchmode -quit -projectPath . -buildTarget ${{ matrix.targetPlatform }} -executeMethod ${{ matrix.buildMethod }} -logFile -

      - name: Upload App
        # 最新の SHA (v4.6.0相当) に更新しました
        uses: actions/upload-artifact@4cec3d8aa04e39d1a6839979c1f40fb237517917 
        with:
          name: App_Develop
          path: Builds/App/
          retention-days: 7
