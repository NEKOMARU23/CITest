name: Build App windows

on:
  workflow_dispatch: { }

env:
  # 将来の警告を消すための設定
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    # Windowsのセキュリティ（Bypass）を考慮した設定
    shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"

jobs:
  buildForWindowsBasedPlatforms:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: [ self-hosted, Windows ]
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
        buildMethod:
          - BuildApp.Build
        unityPath:
          - '"C:\Program Files\Unity\Hub\Editor\6000.3.1f1\Editor\Unity.exe"'
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          clean: false
          submodules: recursive

      - name: Run Build
        run: |
          & ${{ matrix.unityPath }} -batchmode -quit -projectPath . -buildTarget ${{ matrix.targetPlatform }} -executeMethod ${{ matrix.buildMethod }} -logFile -

      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: App_Develop
          # 先ほど作成したフォルダ「Builds/App/」を正確に指定しています
          path: Builds/App/
          retention-days: 7
