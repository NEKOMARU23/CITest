name: Build App windows

on:
  workflow_dispatch: { }

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"

jobs:
  buildForWindowsBasedPlatforms:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: [ self-hosted, Windows ]
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
        buildMethod:
          - BuildApp.Build
        unityPath:
          - '"C:\Program Files\Unity\Hub\Editor\6000.3.1f1\Editor\Unity.exe"'
        projectPath:
          - "CITest"
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          clean: false
          submodules: recursive

      - name: Run Build
        run: |
          # フォルダ階層に合わせて projectPath を CITest/CiTest に修正
          & ${{ matrix.unityPath }} -batchmode -quit -projectPath "CITest/CiTest" -buildTarget ${{ matrix.targetPlatform }} -executeMethod ${{ matrix.buildMethod }} -logFile -
      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: App_Develop
          path: Builds/App/*
          retention-days: 7
