name: Build App windows

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"

jobs:
  buildForWindowsBasedPlatforms:
    name: Build for StandaloneWindows64
    runs-on: [ self-hosted, Windows ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          path: .
          clean: false

      - name: Clean Old Logs
        run: |
          $files = "build.log", "error_summary.txt", "unity_build.log"
          foreach ($f in $files) { if (Test-Path $f) { Remove-Item $f -Force } }

      - name: Run Build
        run: |
          $assetsPath = Get-ChildItem -Path "Assets" -ErrorAction SilentlyContinue
          if ($null -eq $assetsPath) {
              $assetsPath = Get-ChildItem -Path "*/Assets" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($null -eq $assetsPath) { throw "Assets folder not found." }
          
          $projectRoot = if ($assetsPath.PSIsContainer) { $assetsPath.Parent.FullName } else { $assetsPath.Directory.Parent.FullName }
          $unityExe = "C:\Program Files\Unity\Hub\Editor\6000.3.1f1\Editor\Unity.exe"
          $logFile = "build.log"
          
          $process = Start-Process -FilePath $unityExe -ArgumentList "-batchmode", "-quit", "-projectPath", "`"$projectRoot`"", "-buildTarget", "StandaloneWindows64", "-executeMethod", "BuildApp.Build", "-logFile", "`"$logFile`"" -NoNewWindow -Wait -PassThru
          
          if ($process.ExitCode -ne 0) {
              if (Test-Path $logFile) {
                  $errors = Get-Content $logFile | Select-String "error" | Select-Object -First 3
                  $errors | Out-File -FilePath "error_summary.txt" -Encoding utf8
              } else {
                  "Unity process failed (ExitCode: $($process.ExitCode))" | Out-File -FilePath "error_summary.txt" -Encoding utf8
              }
              exit 1
          }

      - name: Upload App
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: App_Develop
          path: "**/Builds/App/*"
          retention-days: 7

      - name: Discord Notification
        if: always()
        # 環境変数としてコミットメッセージを渡す（これが一番化けにくい）
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          # 1. PowerShellのセッション全体の文字コードをUTF-8に固定
          $OutputEncoding = [System.Text.Encoding]::UTF8
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8

          # 2. 環境変数からメッセージを取得（nullなら代替文字）
          $commitMsg = if ($env:COMMIT_MESSAGE) { $env:COMMIT_MESSAGE.Trim() } else { "Manual Workflow Run / Merge" }
          
          # 3. ステータスと色
          $status = "${{ job.status }}"
          $color = if ($status -eq "success") { 3066993 } else { 15158332 }
          $msg = if ($status -eq "success") { "Build Succeeded! Artifacts are ready." } else { "Build Failed! Error detected." }
          $author = "${{ github.actor }}"
          $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # 4. エラーログの読み込み
          $errorSummary = "None"
          if (Test-Path "error_summary.txt") { $errorSummary = Get-Content "error_summary.txt" -Raw -Encoding utf8 }

          # 5. JSONの組み立て（ハッシュテーブルを使用）
          $payload = @{
            embeds = @(@{
              title = "Unity Build Monitor"
              description = $msg
              color = $color
              author = @{ name = "Triggered by: $author" }
              thumbnail = @{ url = "https://cdn.pixabay.com/photo/2021/09/20/03/24/unity-6639522_960_720.png" }
              fields = @(
                @{ name = "Latest Commit"; value = "``$commitMsg``"; inline = $false },
                @{ name = "Build Error (Top 3)"; value = "``$errorSummary``"; inline = $false },
                @{ name = "Download / Logs"; value = "[Open GitHub Actions]($runUrl)"; inline = $false }
              )
              footer = @{ text = "Repo: ${{ github.repository }}" }
            })
          }

          # 6. JSON変換と送信
          $json = $payload | ConvertTo-Json -Depth 5
          $url = "${{ secrets.DISCORD_WEBHOOK }}"
          
          # 確実にUTF-8で送信
          Invoke-RestMethod -Uri $url -Method Post -Body ([System.Text.Encoding]::UTF8.GetBytes($json)) -ContentType "application/json; charset=utf-8"
