name: Build App windows

on:
  workflow_dispatch: { }
  push:
    branches: [ main ] # push時にも動くようにしておくとコミットメッセージが入ります

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"

jobs:
  buildForWindowsBasedPlatforms:
    name: Build for StandaloneWindows64
    runs-on: [ self-hosted, Windows ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          path: .
          clean: false

      - name: Run Build
        run: |
          $assetsPath = Get-ChildItem -Path . -Filter "Assets" -Recurse -Directory | Select-Object -First 1
          if ($null -eq $assetsPath) { throw "Assets folder not found" }
          $projectRoot = $assetsPath.Parent.FullName
          $unityExe = "C:\Program Files\Unity\Hub\Editor\6000.3.1f1\Editor\Unity.exe"
          
          # ログファイル出力を一時ファイルに設定
          $logPath = "unity_build.log"
          
          # ビルド実行
          $process = Start-Process -FilePath $unityExe -ArgumentList "-batchmode", "-quit", "-projectPath", "`"$projectRoot`"", "-buildTarget", "StandaloneWindows64", "-executeMethod", "BuildApp.Build", "-logFile", "`"$logPath`"" -NoNewWindow -Wait -PassThru
          
          # 失敗した場合、ログからエラー行を抽出して環境変数に保存
          if ($process.ExitCode -ne 0) {
              $errorLines = Get-Content $logPath | Select-String "error CS" | Select-Object -First 3
              if ($null -eq $errorLines) { $errorLines = "Unknown build error (Check logs for details)" }
              $errorLines | Out-File -FilePath "error_summary.txt" -Encoding utf8
              exit 1
          }

      - name: Upload App
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: App_Develop
          path: "**/Builds/App/*"
          retention-days: 7

      - name: Discord Notification
        if: always()
        run: |
          $status = "${{ job.status }}"
          $color = if ($status -eq "success") { 3066993 } else { 15158332 }
          $msg = if ($status -eq "success") { "Build Succeeded! Artifacts are ready." } else { "Build Failed! Error detected." }
          
          # エラー情報の読み込み
          $errorSummary = "None"
          if (Test-Path "error_summary.txt") { $errorSummary = Get-Content "error_summary.txt" -Raw }
          
          $commitMsg = "${{ github.event.head_commit.message }}"
          if (-not $commitMsg) { $commitMsg = "Manual Workflow Run" }
          $author = "${{ github.actor }}"
          $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          $body = @{
            embeds = @(@{
              title = "Unity Build Monitor"
              description = $msg
              color = $color
              author = @{ name = "Triggered by: $author" }
              fields = @(
                @{ name = "Latest Commit"; value = "``$commitMsg``"; inline = $false },
                @{ name = "Build Error (Top 3)"; value = "``$errorSummary``"; inline = $false },
                @{ name = "Download / Logs"; value = "[Open GitHub Actions]($runUrl)"; inline = $false }
              )
              footer = @{ text = "Repo: ${{ github.repository }}" }
            })
          } | ConvertTo-Json -Depth 5
          
          Invoke-RestMethod -Uri "${{ secrets.DISCORD_WEBHOOK }}" -Method Post -Body ([System.Text.Encoding]::UTF8.GetBytes($body)) -ContentType "application/json"
