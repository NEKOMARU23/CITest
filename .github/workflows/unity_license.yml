name: Build App windows

on:
  workflow_dispatch: { }

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"

jobs:
  buildForWindowsBasedPlatforms:
    name: Build for StandaloneWindows64
    runs-on: [ self-hosted, Windows ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          path: .
          clean: false

      - name: Run Build
        run: |
          # 1. Assets search
          $assetsPath = Get-ChildItem -Path . -Filter "Assets" -Recurse -Directory | Select-Object -First 1
          if ($null -eq $assetsPath) { throw "Assets folder not found" }
          
          # 2. Project Root
          $projectRoot = $assetsPath.Parent.FullName
          Write-Host "Found Project Root: $projectRoot"
          
          # 3. Unity Path
          $unityExe = "C:\Program Files\Unity\Hub\Editor\6000.3.1f1\Editor\Unity.exe"
          
          # 4. Execute
          Start-Process -FilePath $unityExe -ArgumentList "-batchmode", "-quit", "-projectPath", "`"$projectRoot`"", "-buildTarget", "StandaloneWindows64", "-executeMethod", "BuildApp.Build", "-logFile", "-" -NoNewWindow -Wait

      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: App_Develop
          path: "**/Builds/App/*"
          retention-days: 7

      - name: Discord Notification
        if: always()
        run: |
          $status = "${{ job.status }}"
          $color = if ($status -eq "success") { 3066993 } else { 15158332 }
          $msg = if ($status -eq "success") { "Build Succeeded! Artifacts uploaded." } else { "Build Failed! Check the logs." }
          
          $body = @{
            embeds = @(@{
              title = "Unity Build Monitor"
              description = $msg
              color = $color
              fields = @(
                @{ name = "Repository"; value = "${{ github.repository }}"; inline = $true },
                @{ name = "Status"; value = $status; inline = $true }
              )
            })
          } | ConvertTo-Json -Depth 5
          
          Invoke-RestMethod -Uri "${{ secrets.DISCORD_WEBHOOK }}" -Method Post -Body ([System.Text.Encoding]::UTF8.GetBytes($body)) -ContentType "application/json"
