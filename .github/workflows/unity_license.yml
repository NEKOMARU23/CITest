name: Unity License Activation 🔑

on: workflow_dispatch

jobs:
  activation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Request manual activation file
        # コミットIDを直接指定して、バージョンのエラーを強制回避
        uses: game-ci/unity-request-activation-file@650047515b13b482260667e4125f46487e4757ba
        with:
          unityVersion: 2022.3.10f1
        id: get_alf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unity_License_File
          path: ${{ steps.get_alf.outputs.filePath }}
