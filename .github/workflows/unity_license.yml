- name: Run Build
        run: |
          $assetsPath = Get-ChildItem -Path . -Filter "Assets" -Recurse -Directory | Select-Object -First 1
          if ($null -eq $assetsPath) { throw "Assets folder not found" }
          $projectRoot = $assetsPath.Parent.FullName
          $unityExe = "C:\Program Files\Unity\Hub\Editor\6000.3.1f1\Editor\Unity.exe"
          
          # ログを標準出力（-logFile -）で出しつつ、一時ファイルにも保存
          $logFile = "build.log"
          
          # Unity実行
          $process = Start-Process -FilePath $unityExe -ArgumentList "-batchmode", "-quit", "-projectPath", "`"$projectRoot`"", "-buildTarget", "StandaloneWindows64", "-executeMethod", "BuildApp.Build", "-logFile", "`"$logFile`"" -NoNewWindow -Wait -PassThru
          
          if ($process.ExitCode -ne 0) {
              Write-Host "Build failed with exit code $($process.ExitCode)"
              if (Test-Path $logFile) {
                  # エラー行を抽出（大文字小文字を区別せず 'error' を探す）
                  $errors = Get-Content $logFile | Select-String "error" | Select-Object -First 3
                  $errors | Out-File -FilePath "error_summary.txt" -Encoding utf8
              } else {
                  "Unity log file not found." | Out-File -FilePath "error_summary.txt" -Encoding utf8
              }
              exit 1
          }
