name: Build App windows

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"

jobs:
  buildForWindowsBasedPlatforms:
    name: Build for StandaloneWindows64
    runs-on: [ self-hosted, Windows ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          path: .
          clean: false

      - name: Clean Old Logs
        run: |
          # 前回のログを掃除
          $files = "build.log", "error_summary.txt", "unity_build.log"
          foreach ($f in $files) { if (Test-Path $f) { Remove-Item $f -Force } }

      - name: Check Code Style & Naming
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          # dotnet format で命名規則をチェック
          dotnet format --verify-no-changes --severity error
          if ($LastExitCode -ne 0) {
              "Naming convention violation detected! Please check your C# code style (e.g., PascalCase for methods)." | Out-File -FilePath "error_summary.txt" -Encoding utf8
              exit 1
          }

      - name: Run Build
        run: |
          # 1. プロジェクトルートの特定
          $assetsPath = Get-ChildItem -Path "Assets" -ErrorAction SilentlyContinue
          if ($null -eq $assetsPath) {
              $assetsPath = Get-ChildItem -Path "*/Assets" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($null -eq $assetsPath) { throw "Assets folder not found." }
          $projectRoot = if ($assetsPath.PSIsContainer) { $assetsPath.Parent.FullName } else { $assetsPath.Directory.Parent.FullName }
          
          # 2. Unityの実行
          $unityExe = "C:\Program Files\Unity\Hub\Editor\6000.3.1f1\Editor\Unity.exe"
          $logFile = "build.log"
          $process = Start-Process -FilePath $unityExe -ArgumentList "-batchmode", "-quit", "-projectPath", "`"$projectRoot`"", "-buildTarget", "StandaloneWindows64", "-executeMethod", "BuildApp.Build", "-logFile", "`"$logFile`"" -NoNewWindow -Wait -PassThru
          
          # 3. 失敗時のエラー抽出
          if ($process.ExitCode -ne 0) {
              if (Test-Path $logFile) {
                  $errors = Get-Content $logFile | Select-String "error" | Select-Object -First 3
                  $errors | Out-File -FilePath "error_summary.txt" -Encoding utf8
              } else {
                  "Unity process failed (ExitCode: $($process.ExitCode))" | Out-File -FilePath "error_summary.txt" -Encoding utf8
              }
              exit 1
          }

      - name: Upload App
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: App_Develop
          path: "**/Builds/App/*"
          retention-days: 7

      - name: Discord Notification
        if: always()
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          # 1. UTF-8固定
          $OutputEncoding = [System.Text.Encoding]::UTF8
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8

          # 2. ステータスに応じた色とメッセージの分岐
          $status = "${{ job.status }}"
          if ($status -eq "success") {
              $color = 3066993  # 緑色
              $msg = "✅ Build Succeeded! Artifacts are ready."
              $errorSummary = "No errors detected. Perfect style!"
          } else {
              $color = 15158332 # 赤色
              $msg = "❌ Build Failed! Check style or compiler errors."
              $errorSummary = "Unknown error"
              if (Test-Path "error_summary.txt") { 
                  $errorSummary = Get-Content "error_summary.txt" -Raw -Encoding utf8 
              }
          }

          # 3. 変数準備
          $commitMsg = if ($env:COMMIT_MESSAGE) { $env:COMMIT_MESSAGE.Trim() } else { "Manual Workflow Run" }
          $author = "${{ github.actor }}"
          $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # 4. JSONペイロードの作成
          $payload = @{
            embeds = @(@{
              title = "Unity Build Monitor (CI Check)"
              description = $msg
              color = $color
              author = @{ name = "Triggered by: $author" }
              thumbnail = @{ url = "https://cdn.pixabay.com/photo/2021/09/20/03/24/unity-6639522_960_720.png" }
              fields = @(
                @{ name = "Latest Commit"; value = "``$commitMsg``"; inline = $false },
                @{ name = "Build Analysis"; value = "``$errorSummary``"; inline = $false },
                @{ name = "Action Link"; value = "[Open GitHub Actions]($runUrl)"; inline = $false }
              )
              footer = @{ text = "Repo: ${{ github.repository }}" }
            })
          }

          # 5. Discordへ送信
          $json = $payload | ConvertTo-Json -Depth 5
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($json)
          Invoke-RestMethod -Uri "${{ secrets.DISCORD_WEBHOOK }}" -Method Post -Body $bytes -ContentType "application/json; charset=utf-8"
