name: Build App windows

on:
  workflow_dispatch: { }

env:
  # Node.js 20の警告を抑制しつつ、確実にNode 24で実行させる
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"

jobs:
  buildForWindowsBasedPlatforms:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: [ self-hosted, Windows ]
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
        buildMethod:
          - BuildApp.Build
        unityPath:
          - '"C:\Program Files\Unity\Hub\Editor\6000.3.1f1\Editor\Unity.exe"'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          # フォルダ階層の混乱を防ぐため、チェックアウト先を明示的に固定
          path: .
          clean: false
          submodules: recursive

      - name: Run Build
        run: |
          # 1. リポジトリ内のどこかに「Assets」があるか自動検索する
          # CITest/CiTest/Assets のような深い階層でも、これで親フォルダを見つけ出します
          $assetsPath = Get-ChildItem -Path . -Filter "Assets" -Recurse -Directory | Select-Object -First 1
          
          if ($null -eq $assetsPath) {
              Write-Error "Assetsフォルダが見つかりませんでした。リポジトリの構造を確認してください。"
              exit 1
          }

          # Assetsの親フォルダ（プロジェクトルート）を取得
          $projectRoot = $assetsPath.Parent.FullName
          echo "Found Project Root: $projectRoot"

          # 2. 自動で見つけたパスを渡してUnityを起動
          & ${{ matrix.unityPath }} -batchmode -quit -projectPath "$projectRoot" -buildTarget ${{ matrix.targetPlatform }} -executeMethod ${{ matrix.buildMethod }} -logFile -

      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: App_Develop
          # どこに生成されてもArtifactが見つかるようにワイルドカードで指定
          path: "**/Builds/App/*"
          retention-days: 7
