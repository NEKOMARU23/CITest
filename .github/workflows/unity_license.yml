- name: Discord Notification
        if: always()
        run: |
          $status = "${{ job.status }}"
          $color = if ($status -eq "success") { 3066993 } else { 15158332 }
          $msg = if ($status -eq "success") { "Build Succeeded! Artifacts are ready." } else { "Build Failed! Error detected." }
          
          # 修正ポイント：GitHub変数を一度変数に入れてから処理する（エラー回避）
          $rawCommitMsg = @'
          ${{ github.event.head_commit.message }}
          '@.Trim()
          
          $commitMsg = if ([string]::IsNullOrWhiteSpace($rawCommitMsg)) { "Manual Workflow Run" } else { $rawCommitMsg }
          
          $author = "${{ github.actor }}"
          $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # エラー情報の読み込み
          $errorSummary = "None"
          if (Test-Path "error_summary.txt") { $errorSummary = Get-Content "error_summary.txt" -Raw }
          if ([string]::IsNullOrWhiteSpace($errorSummary)) { $errorSummary = "No specific error found in summary." }

          $body = @{
            embeds = @(@{
              title = "Unity Build Monitor"
              description = $msg
              color = $color
              author = @{ name = "Triggered by: $author" }
              fields = @(
                @{ name = "Latest Commit"; value = "``$commitMsg``"; inline = $false },
                @{ name = "Build Error (Top 3)"; value = "``$errorSummary``"; inline = $false },
                @{ name = "Download / Logs"; value = "[Open GitHub Actions]($runUrl)"; inline = $false }
              )
              footer = @{ text = "Repo: ${{ github.repository }}" }
            })
          } | ConvertTo-Json -Depth 5
          
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($body)
          Invoke-RestMethod -Uri "${{ secrets.DISCORD_WEBHOOK }}" -Method Post -Body $bytes -ContentType "application/json"
