name: Build App windows

on:
  workflow_dispatch: { }

defaults:
  run:
    shell: bash

jobs:
  buildForWindowsBasedPlatforms:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: [ self-hosted, Windows ]
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
        buildMethod:
          - BuildApp.Build
        unityPath:
          - '"C:\Program Files\Unity\Hub\Editor\6000.3.1f1\Editor\Unity.exe"'
    steps:
      # @v4 を 長いID に書き換えました
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 
        with:
          lfs: true
          clean: false
          submodules: recursive

      - name: Run Build
        run: |
          ${{ matrix.unityPath }} -batchmode -quit -projectPath . -buildTarget ${{ matrix.targetPlatform }} -executeMethod ${{ matrix.buildMethod }} -logFile -

      - name: Upload App
        # @v4 を 長いID に書き換えました
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea23f8d3e55df21b883ee3b15 
        with:
          name: App_Develop
          path: Builds/App/
          retention-days: 7
